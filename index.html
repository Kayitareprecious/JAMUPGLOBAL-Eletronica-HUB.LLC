    <script>
window.addEventListener('load', function() {
  const form = document.querySelector('form'); // This finds your booking form
  if (form) {
    form.addEventListener('submit', async function(e) {
      e.preventDefault();
      
      // Get the data from your form fields
      const formData = new FormData(form);
      const data = {
        name: formData.get('name'), 
        phone: formData.get('phone'),
        customer_email: formData.get('email'),
        device_type: formData.get('deviceType'),
        problem_description: formData.get('issue')
      };

      // The Direct Connection to Supabase
      const response = await fetch("https://nzexzuthgsfzlwyfuqlg.supabase.co/rest/v1/bookings", {
        method: "POST",
        headers: { "Content-Type": "application/json", "Prefer": "return=minimal" },
        body: JSON.stringify(data)
      });

      if (response.ok) {
        alert("Booking Successful!");
        form.reset();
      } else {
        alert("Something went wrong. Please try again.");
      }
    });
  }
});
</script>
